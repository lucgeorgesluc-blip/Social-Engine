        brief: |
          Calcul concret et visuel:
          - 1 paquet/jour en 2026 = ~14 euros
          - Par mois = ~420 euros
          - Par an = ~5 000 euros
          - Sur 5 ans = 25 000 euros (une voiture!)
          VS accompagnement hypnose+magnetisme = [prix en DM]
          "Rembourse" en moins de 2 semaines d'arret.
          HOOK: "5 000 euros. C'est ce que vous brulez chaque annee."
        cta: "Combien depensez-vous par mois ? Dites-le en commentaire."
        notes: "Preparer l'objection 'trop cher' avant qu'elle arrive. LinkedIn aussi (angle economique)."

      - id: POST-2026-04-18-01
        day: vendredi
        date: "2026-04-18"
        platform: facebook
        type: temoignage
        objection_addressed: rechute
        priority: 3
        status: drafted
        angle: "Temoignage long-terme — 6 mois apres l'arret"
        brief: |
          Temoignage d'un patient qui a arrete il y a 6+ mois.
          Focus: la duree, pas juste l'arret immediat.
          Details: ce qui a change dans sa vie (sante, argent, fierte).
          Mention de la seance de renforcement gratuite.
          HOOK: "[Prenom], 6 mois sans tabac : 'Je ne me reconnais plus.'"
        cta: "Ecrivez INFO si vous voulez savoir comment ca se passe concretement."
        notes: "Reponse anticipee a OBJ-rechute"

