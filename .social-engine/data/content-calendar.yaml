# Content Calendar — Social Acquisition Engine
# Genere: 2026-04-05
# Base sur: analyse des commentaires POST-2026-04-01-01
#
# PRIORITES identifiees:
# 1. OBJ-volonte (freq 3) -> post dedie URGENT
# 2. OBJ-arnaque (freq 3) -> post credibilite/transparence URGENT
# 3. OBJ-temoignages (freq 1) -> integrer temoignages DANS les posts
# 4. OBJ-reactivite (freq 2) -> pas un post mais un COMPORTEMENT (repondre < 2h)
#
# LECONS du 1er post:
# - Le format "histoire anonyme" genere du scepticisme ("copier-coller", "ou sont les temoignages")
# - Prochains posts: plus personnels, avec preuves concretes (prenom, details, avis Google)
# - Repondre DANS LES 2H aux "INFO" — Sylvie a tourne negative par manque de reactivite
# - Ne jamais poster le lien Calendly en public (OK en DM uniquement)

# ============================================================
# SEMAINE 1 — 7-11 avril 2026
# Theme: Credibilite + Preuve sociale (reponse aux critiques)
# ============================================================

weeks:
  - week: "2026-W15"
    dates: "07/04 - 11/04"
    theme: "Credibilite et preuve sociale"
    posts:
      - id: POST-2026-04-07-01
        day: lundi
        date: "2026-04-07"
        platform: facebook
        type: temoignage
        objection_addressed: arnaque
        priority: 1
        status: published
        angle: "Temoignage NOMME avec details concrets — casser l'image 'copier-coller'"
        brief: |
          Post avec un vrai temoignage (prenom + details specifiques).
          Mentionner: nombre de seances, delai, resultat concret.
          Inclure: "Vous pouvez lire ses avis et ceux de 35 autres personnes sur Google"
          Format: citation directe du patient, pas narration a la 3e personne.
          HOOK: La citation du patient elle-meme, pas "une personne m'a dit"
        cta: "Vous avez des questions ? Posez-les ici, je reponds a tout."
        notes: "Reponse directe a Nini ('copier-coller') et Caly ('ou sont les temoignages')"

      - id: POST-2026-04-08-01
        day: mercredi
        date: "2026-04-09"
        platform: facebook
        type: objection-buster
        objection_addressed: volonte
        priority: 1
        status: drafted
        angle: "La volonte ne suffit pas — et c'est normal (neurosciences)"
        brief: |
          Hook: "On me dit souvent : 'Il suffit de vouloir pour arreter.'"
          Expliquer POURQUOI la volonte seule echoue (nicotine = recepteurs cerebraux,
          pas un manque de caractere).
          Transition: l'hypnose agit sur les automatismes inconscients,
          la ou la volonte consciente n'a pas acces.
          Ton: educatif, pas condescendant. Valider la volonte PUIS montrer ses limites.
          Chiffre: "70% des fumeurs qui arretent par volonte seule rechutent dans les 6 mois"
        cta: "Commentez VOLONTE si ca vous parle, je vous explique comment ca marche."
        notes: "Reponse a Martine et Marion (OBJ-volonte freq 3)"

      - id: POST-2026-04-11-01
        day: vendredi
        date: "2026-04-11"
        platform: facebook
        type: myth-buster
        objection_addressed: arnaque
        priority: 2
        status: drafted
        angle: "Transparence totale — qui je suis, comment ca marche, combien ca coute"
        brief: |
          Post "carte sur table" : presenter Corinne en personne.
          - Qui: prenom, parcours, formation (Pascal Bescos), 15+ ans
          - Quoi: magnetisme + hypnose ericksonienne, pas de magie
          - Ou: cabinet a Saint-Germain, pas en ligne
          - Combien: fourchette de prix (en DM si prefere)
          - Preuves: "35 avis Google, 4.9 etoiles — allez voir par vous-meme"
          - Photo: idealement photo du cabinet ou de Corinne
          Ton: direct, humain, zero bullshit.
          HOOK: "Je vais etre honnete avec vous."
        cta: "Posez-moi la question qui vous bloque. Je reponds ici, publiquement."
        notes: "Reponse frontale a OBJ-arnaque. Transparence = meilleure defense."

