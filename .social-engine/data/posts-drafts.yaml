    On me pose la question au moins 1 fois sur 3. Et ça me fait sourire, parce que je comprends.

    Le mot "magnétisme" fait penser à des forces mystérieuses, de l'ésotérique, des rituels. Normal : c'est l'image qu'on en a.

    La réalité, c'est beaucoup plus simple.

    Le magnétisme, c'est un travail énergétique. Le praticien utilise ses mains pour aider le corps à relâcher les tensions, à rétablir son équilibre. Pas d'encens, pas d'incantations, pas de baguette.

    C'est une pratique de bien-être reconnue, exercée par des milliers de praticiens en France. Pas un substitut médical — un complément.

    Combiné avec l'hypnose ericksonienne (technique validée scientifiquement, rapport INSERM 2015), ça donne un accompagnement complet :
    🧠 L'hypnose travaille sur le mental — les automatismes, les déclencheurs
    🤲 Le magnétisme travaille sur le corps — les tensions, l'élimination

    Ensemble, c'est ce qui permet à 85% de mes patients d'arrêter de fumer en 1 séance.

    Pas de magie. Du travail, de l'écoute, et 15 ans d'expérience.

    💬 Une question ? Je réponds à tout, ici ou en privé.

