    "Vous avez peur de l'hypnose ?"

    C'est la question que je pose à presque chaque nouveau patient. Et 1 fois sur 2, la réponse est oui.

    Normal. On a tous vu Messmer à la télé. On imagine qu'on va perdre le contrôle, dire des choses bizarres, ou se retrouver "coincé" dans un état second.

    La réalité est très différente.

    L'hypnose ericksonienne, celle que je pratique, c'est :
    🧠 Vous restez conscient du début à la fin
    👀 Vous pouvez ouvrir les yeux à tout moment
    🗣️ Vous entendez tout ce que je dis
    🚪 Vous pouvez vous lever et partir si vous le souhaitez

    C'est un état naturel. Vous le vivez déjà quand vous êtes absorbé dans un film et que quelqu'un vous parle sans que vous entendiez. C'est tout.

    Mon rôle, c'est de guider. Votre rôle, c'est de décider.

    Aucun praticien sérieux ne peut vous "forcer" quoi que ce soit sous hypnose. Si quelqu'un vous dit le contraire, fuyez.

