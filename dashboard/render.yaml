services:
  - type: web
    name: social-dashboard
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: cd dashboard && npm install && npm run build:css
    startCommand: cd dashboard && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: DASHBOARD_PASSWORD_HASH
        sync: false
    healthCheckPath: /health
