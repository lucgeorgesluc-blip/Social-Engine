    content: |
      "Grace a une seance d'hypnose, je ne fume plus."
      Ce n'est pas moi qui le dis. C'est Chloe, dans son avis Google.
      Elle est venue me voir pour arreter le tabac. Une seance. Une seule.
      Depuis, plus une cigarette.
      Elle a aussi voulu travailler sur un autre sujet, plus personnel.
      Et la encore, une seance a suffi pour se sentir "bien mieux psychologiquement" — ce sont ses mots.
      Ce que j'aime dans ce temoignage, c'est qu'il est simple. Pas de miracle, pas de formule magique.
      Juste un accompagnement serieux, de l'ecoute, et un resultat concret.
      Chloe fait partie des 85% de mes patients qui arretent des la 1ere seance.
      Vous pouvez lire son avis et ceux de 35 autres personnes sur ma fiche Google —
      tapez "Corinne Lacoste magnetiseuse" dans Google, les avis sont publics.
      Vous avez des questions ? Posez-les ici en commentaire, je reponds a tout.
      Ou ecrivez "INFO" et je vous envoie les details en prive.
      Cabinet a Saint-Germain, pres de Troyes
